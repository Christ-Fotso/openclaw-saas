
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=2000
      - DATABASE_URL=postgresql://postgres:password@db:5432/openclaw
    depends_on:
      - db
    restart: on-failure

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openclaw
    ports:
      - "5432:5432"
    volumes:
      - openclaw_pgdata:/var/lib/postgresql/data

volumes:
  openclaw_pgdata:
